services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sound_royale
      POSTGRES_USER: sound_royale
      POSTGRES_PASSWORD: sound_royale_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sound_royale"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - CORS_ALLOWED_ORIGINS=http://localhost:80
      - REDIS_URL=redis://redis:6379/0
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=sound_royale
      - DB_USER=sound_royale
      - DB_PASSWORD=sound_royale_dev
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
