name = "sound-royale-ny"
compatibility_date = "2025-07-01"

# Static Cloudflare Pages project (Vite SPA). No [build] block — the dashboard
# runs `pnpm install --frozen-lockfile && pnpm run build`; a [build] block here
# makes Cloudflare reject the deploy ("Unexpected fields found in build field").
pages_build_output_dir = "dist"

# Vite reads import.meta.env.* at BUILD TIME. REST + WS go DIRECTLY to the
# Railway backend (no Cloudflare Pages Function proxy) so API traffic is not
# billed as a Cloudflare request. CORS on the backend already allows
# https://soundroyale.pages.dev. VITE_WS_URL is derived from this URL
# (http->ws, strip /api) so it needs no separate setting.
[vars]
VITE_API_BASE_URL = "https://sound-royale-backend-production.up.railway.app/api"
