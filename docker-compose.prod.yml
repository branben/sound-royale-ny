services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sound_royale
      POSTGRES_USER: sound_royale
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: []  # Don't expose PostgreSQL externally in production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sound_royale"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    ports: []  # Don't expose Redis externally in production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    environment:
      # Inherit SECRET_KEY, DEBUG, REDIS_URL from .env
      - SECURE_SSL_REDIRECT=True
      - SECURE_HSTS_SECONDS=31536000
      - SESSION_COOKIE_SECURE=True
      - CSRF_COOKIE_SECURE=True
      - CORS_ALLOWED_ORIGINS=https://${DOMAIN}
      - CSRF_TRUSTED_ORIGINS=https://${DOMAIN}
      - ALLOWED_HOSTS=${DOMAIN},localhost
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=sound_royale
      - DB_USER=sound_royale
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
    expose:
      - "8000"  # Only expose internally; remove published port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    environment:
      - SSL_DOMAIN=${DOMAIN}
    depends_on:
      - backend

  certbot:
    image: certbot/certbot:latest
    container_name: sound-royale-certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c"
    command: >
      "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot
      --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN};
      sleep 12h & wait $${!}; done;"
    depends_on:
      - frontend

volumes:
  postgres_data:
    name: sound-royale-postgres-data
  certbot_etc:
    name: sound-royale-certbot-etc
  certbot_webroot:
    name: sound-royale-certbot-webroot
