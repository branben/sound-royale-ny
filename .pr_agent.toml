[config]
model = "gpt-4o-mini"
# LiteLLM routes gpt-4o-mini via OpenAI provider (respects api_base/api_key from env).
# OmniRoute model_combo_mapping routes gpt-4o-mini → coding-unlimited combo:
#   NVIDIA OSS 120B → Mistral Devstral → Groq OSS 120B → OpenRouter OWL Alpha
# No LiteLLM fallbacks needed — OmniRoute combo handles provider failover.
fallback_models = []
custom_model_max_tokens = 64000

[github_action_config]
auto_review = true
auto_describe = true
auto_improve = true

[pr_reviewer]
require_tests_review = false
require_security_review = true
require_estimate_effort_to_review = true
require_ticket_analysis_review = false
num_max_findings = 5
persistent_comment = true
enable_intro_text = true

[pr_description]
use_bullet_points = true
enable_pr_type = true
enable_semantic_files_types = true
collapsible_file_list = 'adaptive'

[pr_code_suggestions]
focus_only_on_problems = true
suggestions_score_threshold = 0
num_code_suggestions_per_chunk = 3
persistent_comment = true

[github]
deployment_type = "user"
