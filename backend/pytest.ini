[pytest]
DJANGO_SETTINGS_MODULE = sound_royale_api.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --reuse-db --maxfail=10
testpaths = game_engine gaia/tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database involved)
    slow: Slow tests (performance or heavy computation)
    transaction: Tests that verify transaction safety
    validation: Tests that verify data validation
    routing: Tests that verify URL routing
