[build]
builder = "docker"
dockerfile = "Dockerfile.backend"
[deploy]
healthcheckPath = "/health/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
releaseCommand = "python manage.py migrate --noinput"

[[services]]
name = "sound-royale-backend"

[[services.env]]
DJANGO_SETTINGS_MODULE = "sound_royale_api.settings"
DEBUG = "False"
PORT = "8000"
SECRET_KEY = "${{RAILWAY_DJANGO_SECRET_KEY}}"
ALLOWED_HOSTS = "${{RAILWAY_ALLOWED_HOSTS}}"
DB_ENGINE = "django.db.backends.postgresql"
DB_HOST = "${{Postgres.PGHOST}}"
DB_NAME = "${{Postgres.PGDATABASE}}"
DB_USER = "${{Postgres.PGUSER}}"
DB_PASSWORD = "${{Postgres.PGPASSWORD}}"
DB_PORT = "${{Postgres.PGPORT}}"
REDIS_URL = "${{Redis.REDIS_URL}}"
CORS_ALLOWED_ORIGINS = "${{RAILWAY_CORS_ORIGINS}}"
SECURE_SSL_REDIRECT = "True"
SESSION_COOKIE_SECURE = "True"
CSRF_COOKIE_SECURE = "True"
