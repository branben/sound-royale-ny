name: Visual Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # PixelRAG design-token gate: bgNearBlack / noGradient / noGlow across public routes.
  # (Auth-gated room route requires a running Django backend + seed; out of scope here —
  #  run capture.sh --seed locally. The public 8 routes need no backend.)
  pixelrag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install PixelRAG (pixelshot)
        run: pipx install pixelrag

      - name: Install Playwright Chromium (pixelshot playwright backend)
        run: npx playwright install --with-deps chromium

      - name: Start Vite dev server
        run: pnpm exec vite --port 8081 --host &

      - name: Wait for dev server
        run: npx wait-on http://localhost:8081

      - name: Capture + assert
        working-directory: scripts/visual-verify
        run: |
          ./capture.sh
          node assert.mjs captures/latest

      - name: Upload report + tiles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-verify-pixelrag
          path: scripts/visual-verify/captures/latest

  # Playwright visual-regression gate: per-route toHaveScreenshot diffs.
  # Catches content/layout/text/CTA regressions the design-token checks can't.
  # The room route uses the repo's mock helpers (no backend needed).
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start Vite dev server
        run: pnpm exec vite --port 8081 --host &

      - name: Wait for dev server
        run: npx wait-on http://localhost:8081

      - name: Run visual-regression suite
        run: pnpm run verify:visual:e2e

      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-verify-playwright
          path: test-results
