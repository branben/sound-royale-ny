name: TestDriver.ai Tests

on:
  workflow_dispatch:

jobs:
   test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required to mint the OIDC token for auth
      contents: read
    # Expose the deployment target to the TestDriver smoke suite. GitHub Actions
    # does NOT auto-inject repo `vars.*` as env vars — they must be mapped
    # explicitly. smoke.test.mjs reads process.env.SOUND_ROYALE_URL and fails
    # fast if it is missing, so without this mapping the `test` job stays red
    # even after the variable is set in repo settings.
    env:
      SOUND_ROYALE_URL: ${{ vars.SOUND_ROYALE_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Authenticate to TestDriver via GitHub OIDC (no stored secret needed once the
    # TestDriver GitHub App is authorized for your org). Falls back to a TD_API_KEY
    # secret if you set one. Exports TD_API_KEY for the test step below.
    - name: Authenticate to TestDriver
      uses: testdriverai/action@test
      with:
        channel: test
        api-key: ${{ secrets.TD_API_KEY }}

    # Run ONLY the TestDriver computer-use suite via its dedicated config so it
    # never collides with the frontend unit tests (vitest.config.ts, src/**).
    - name: Run TestDriver.ai tests
      run: npx vitest run --config vitest.testdriver.config.mjs

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
        retention-days: 30
