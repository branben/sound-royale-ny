name: Auto Review

on:
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read
  statuses: write

jobs:
  auto-review:
    runs-on: ubuntu-latest

    env:
      REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OMNIROUTE_API_KEY: ${{ secrets.OMNIROUTE_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install OmniRoute
        run: npm install -g omniroute

      - name: Find PR for branch
        id: pr_info
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open --head "${{ github.ref_name }}" --json number -q '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch ${{ github.ref_name }}"
            exit 1
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "PR: #$PR_NUMBER"

      - name: Fetch PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff "${{ steps.pr_info.outputs.number }}" --repo "$REPO" 2>&1)
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract changed files
        id: files
        run: |
          CHANGED=$(echo "${{ steps.diff.outputs.diff }}" | grep '^diff --git' | sed 's|diff --git a/\(.\+\) b/.\+|\1|' | head -20)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Ensure labels exist
        run: |
          gh label create needs-human-review --color "ededed" --description "Auto-review escalated - needs human reviewer" --repo "$REPO" 2>/dev/null || true
          gh label create auto-reviewed --color "0e8a16" --description "Auto-reviewed by LLM agents" --repo "$REPO" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write prompts
        run: |
          DIFF="${{ steps.diff.outputs.diff }}"
          CHANGED="${{ steps.files.outputs.files }}"

          cat > /tmp/security-prompt.txt << PROMPT
          You are a security-focused code reviewer for a Django + React + TypeScript + WebSocket application.

          Review this PR diff for security vulnerabilities.

          ## Changed Files
          ${CHANGED}

          ## Diff
          ```diff
          ${DIFF:0:8000}
          ```

          Check for: injection (SQL, XSS, command), broken auth, hardcoded secrets, insecure deserialization, missing input validation, OWASP Top 10.

          Output ONLY a JSON array. If no findings, output [].

          Format each finding:
          {"severity":"critical|high|medium|low|info","file":"<filename>","line":<number_or_null>","cwe":"CWE-XXX","description":"<issue>","impact":"<risk>","fix":"<suggestion>"}
          PROMPT

          cat > /tmp/quality-prompt.txt << PROMPT
          You are a code quality reviewer for a React + TypeScript + Tailwind + Django application.

          Review this PR diff for code quality issues.

          ## Changed Files
          ${CHANGED}

          ## Diff
          ```diff
          ${DIFF:0:6000}
          ```

          Check for: unused imports, missing cleanup after refactor, accessibility issues, type safety (any, @ts-ignore), code duplication, error handling anti-patterns.

          Output ONLY a JSON array. If no findings, output [].

          Format: {"severity":"low|info","file":"<filename>","line":<number_or_null>","description":"<issue>","fix":"<suggestion>"}
          PROMPT

          cat > /tmp/arch-prompt.txt << PROMPT
          You are an architecture reviewer for a Django + React + WebSocket multiplayer game.

          Review this PR diff for architectural compliance.

          ## Changed Files
          ${CHANGED}

          ## Diff
          ```diff
          ${DIFF:0:6000}
          ```

          Check for: broken component contracts, new implicit dependencies, circular imports, state machine violations, mixing of concerns (infra in domain code), WebSocket flow integrity.

          Output ONLY a JSON array. If no findings, output [].

          Format: {"severity":"medium|low|info","file":"<filename>","line":<number_or_null>","description":"<issue>","fix":"<suggestion>"}
          PROMPT

          echo "Prompts written"

      - name: Run security review
        id: security
        run: |
          DIFF=$(gh pr diff "${{ steps.pr_info.outputs.number }}" --repo "$REPO")
          echo "$DIFF" > /tmp/diff-content.txt
          CHANGED="${{ steps.files.outputs.files }}"
          echo "$CHANGED" > /tmp/changed-files.txt

          export DIFF_CONTENT="$DIFF"
          export CHANGED_FILES="$CHANGED"

          python3 scripts/ci/llm_review.py /tmp/security-prompt.txt /tmp/security-findings.json owl-alpha "You are a security-focused code reviewer. Output ONLY valid JSON, no markdown."

          echo "result=$(cat /tmp/security-findings.json | jq -c .)"

      - name: Run quality review
        id: quality
        run: |
          DIFF=$(gh pr diff "${{ steps.pr_info.outputs.number }}" --repo "$REPO")
          echo "$DIFF" > /tmp/diff-content.txt
          CHANGED="${{ steps.files.outputs.files }}"
          echo "$CHANGED" > /tmp/changed-files.txt

          export DIFF_CONTENT="$DIFF"
          export CHANGED_FILES="$CHANGED"

          python3 scripts/ci/llm_review.py /tmp/quality-prompt.txt /tmp/quality-findings.json always-on-free "You are a code quality reviewer. Output ONLY valid JSON, no markdown."

          echo "result=$(cat /tmp/quality-findings.json | jq -c .)"

      - name: Run architecture review
        id: architecture
        run: |
          DIFF=$(gh pr diff "${{ steps.pr_info.outputs.number }}" --repo "$REPO")
          echo "$DIFF" > /tmp/diff-content.txt
          CHANGED="${{ steps.files.outputs.files }}"
          echo "$CHANGED" > /tmp/changed-files.txt

          export DIFF_CONTENT="$DIFF"
          export CHANGED_FILES="$CHANGED"

          python3 scripts/ci/llm_review.py /tmp/arch-prompt.txt /tmp/arch-findings.json owl-alpha "You are an architecture reviewer. Output ONLY valid JSON, no markdown."

          echo "result=$(cat /tmp/arch-findings.json | jq -c .)"

      - name: Synthesize and post review
        if: always()
        id: synthesize
        env:
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
        run: |
          python3 scripts/ci/synthesize_review.py

      - name: Add labels and status check
        if: always()
        env:
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
        run: |
          python3 scripts/ci/post_review.py
