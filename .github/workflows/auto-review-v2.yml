name: Auto Review

on:
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read
  statuses: write

jobs:
  auto-review:
    runs-on: ubuntu-latest

    env:
      REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OMNIROUTE_API_KEY: ${{ secrets.OMNIROUTE_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install OmniRoute
        run: npm install -g omniroute

      - name: Find PR for branch
        id: pr_info
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open --head "${{ github.ref_name }}" --json number -q '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch ${{ github.ref_name }}"
            exit 1
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "PR: #$PR_NUMBER"

      - name: Fetch PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff "${{ steps.pr_info.outputs.number }}" --repo "$REPO" 2>&1)
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract changed files
        id: files
        run: |
          python3 << 'PYEOF'
          import os, subprocess
          diff = subprocess.run(["gh", "pr", "diff", os.environ["PR_NUMBER"], "--repo", os.environ["REPO"]], capture_output=True, text=True).stdout
          changed = []
          for line in diff.split("\n"):
              if line.startswith("diff --git"):
                  # Extract filename from "diff --git a/path b/path"
                  parts = line.split(" b/")
                  if len(parts) == 2:
                      changed.append(parts[0].replace("diff --git a/", ""))
          result = "\n".join(changed[:20])
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"files<<EOF\n{result}\nEOF\n")
          print(f"Found {len(changed)} changed files")
          PYEOF
        env:
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
          REPO: ${{ github.repository }}

      - name: Ensure labels exist
        run: |
          gh label create needs-human-review --color "ededed" --description "Auto-review escalated - needs human reviewer" --repo "$REPO" 2>/dev/null || true
          gh label create auto-reviewed --color "0e8a16" --description "Auto-reviewed by LLM agents" --repo "$REPO" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write prompts
        run: |
          gh pr diff "${{ steps.pr_info.outputs.number }}" --repo "$REPO" > /tmp/pr-diff.txt
          echo "${{ steps.files.outputs.files }}" > /tmp/changed-files.txt
          python3 scripts/ci/write_prompts.py

      - name: Run security review
        id: security
        run: |
          python3 scripts/ci/llm_review.py /tmp/security-prompt.txt /tmp/security-findings.json owl-alpha "You are a security-focused code reviewer. Output ONLY valid JSON, no markdown."
          echo "count=$(cat /tmp/security-findings.json | jq length)"

      - name: Run quality review
        id: quality
        run: |
          python3 scripts/ci/llm_review.py /tmp/quality-prompt.txt /tmp/quality-findings.json always-on-free "You are a code quality reviewer. Output ONLY valid JSON, no markdown."
          echo "count=$(cat /tmp/quality-findings.json | jq length)"

      - name: Run architecture review
        id: architecture
        run: |
          python3 scripts/ci/llm_review.py /tmp/arch-prompt.txt /tmp/arch-findings.json owl-alpha "You are an architecture reviewer. Output ONLY valid JSON, no markdown."
          echo "count=$(cat /tmp/arch-findings.json | jq length)"

      - name: Synthesize and post review
        if: always()
        id: synthesize
        env:
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
        run: |
          python3 scripts/ci/synthesize_review.py

      - name: Add labels and status check
        if: always()
        env:
          PR_NUMBER: ${{ steps.pr_info.outputs.number }}
        run: |
          python3 scripts/ci/post_review.py
