name: Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read
  statuses: write

jobs:
  auto-review:
    runs-on: ubuntu-latest

    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      OMNIROUTE_API_KEY: ${{ secrets.OMNIROUTE_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install OmniRoute
        run: npm install -g omniroute

      - name: Verify tools
        run: |
          gh auth status
          omniroute --version

      - name: Fetch PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO" 2>&1)
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract changed files
        id: files
        run: |
          CHANGED=$(echo "${{ steps.diff.outputs.diff }}" | grep '^diff --git' | sed 's|diff --git a/\(.\+\) b/.\+|\1|' | head -20)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Ensure labels exist
        run: |
          gh label create needs-human-review --color "ededed" --description "Auto-review escalated - needs human reviewer" --repo "$REPO" 2>/dev/null || true
          gh label create auto-reviewed --color "0e8a16" --description "Auto-reviewed by LLM agents" --repo "$REPO" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write review scripts
        run: |
          mkdir -p /tmp/review

          cat > /tmp/review/llm_review.py << 'PYTHON_SCRIPT'
          import json, os, subprocess, sys

          prompt_file = sys.argv[1]
          output_file = sys.argv[2]
          combo = sys.argv[3]
          system_prompt = sys.argv[4]

          with open(prompt_file) as f:
              prompt = f.read()

          cmd = [
              "npx", "omniroute", "chat",
              "--file", prompt_file,
              "--combo", combo,
              "--system", system_prompt,
              "--temperature", "0.1",
              "--max-tokens", "2000",
              "--no-history",
          ]

          result = subprocess.run(cmd, capture_output=True, text=True, timeout=180)

          if result.returncode != 0:
              print(f"Error: {result.stderr[:200]}", file=sys.stderr)
              with open(output_file, "w") as f:
                  json.dump([], f)
              sys.exit(0)

          output = result.stdout.strip()
          lines = output.split("\n")
          content_lines = []
          in_content = False
          for line in lines:
              if line.startswith("\U0001f4cb") or ("[" in line and "\u00b7" in line):
                  continue
              if line.strip() == "":
                  if in_content:
                      content_lines.append(line)
                  continue
              in_content = True
              content_lines.append(line)

          output = "\n".join(content_lines).strip()

          if "```" in output:
              output = output.split("```")[1]
              if output.startswith("json"):
                  output = output[4:]
              output = output.strip()

          for i, c in enumerate(output):
              if c in ("[", "{"):
                  output = output[i:]
                  break

          try:
              findings = json.loads(output)
              if not isinstance(findings, list):
                  findings = []
          except json.JSONDecodeError:
              findings = []

          with open(output_file, "w") as f:
              json.dump(findings, f, indent=2)

          print(f"Found {len(findings)} findings")
          PYTHON_SCRIPT

          cat > /tmp/review/security_prompt.txt << 'PROMPT'
          You are a security-focused code reviewer for a Django + React + TypeScript + WebSocket application.

          Review the PR diff below for security vulnerabilities.

          Check for: injection (SQL, XSS, command), broken auth, hardcoded secrets, insecure deserialization, missing input validation, OWASP Top 10.

          Output ONLY a JSON array. If no findings, output [].

          Format each finding:
          {"severity":"critical|high|medium|low|info","file":"<filename>","line":<number_or_null>","cwe":"CWE-XXX","description":"<issue>","impact":"<risk>","fix":"<suggestion>"}
          PROMPT

          cat > /tmp/review/quality_prompt.txt << 'PROMPT'
          You are a code quality reviewer for a React + TypeScript + Tailwind + Django application.

          Review the PR diff below for code quality issues.

          Check for: unused imports, missing cleanup after refactor, accessibility issues, type safety (any, @ts-ignore), code duplication, error handling anti-patterns.

          Output ONLY a JSON array. If no findings, output [].

          Format: {"severity":"low|info","file":"<filename>","line":<number_or_null>","description":"<issue>","fix":"<suggestion>"}
          PROMPT

          cat > /tmp/review/arch_prompt.txt << 'PROMPT'
          You are an architecture reviewer for a Django + React + WebSocket multiplayer game.

          Review the PR diff below for architectural compliance.

          Check for: broken component contracts, new implicit dependencies, circular imports, state machine violations, mixing of concerns (infra in domain code), WebSocket flow integrity.

          Output ONLY a JSON array. If no findings, output [].

          Format: {"severity":"medium|low|info","file":"<filename>","line":<number_or_null>","description":"<issue>","fix":"<suggestion>"}
          PROMPT

          echo "Scripts written"

      - name: Run security review
        id: security
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO")
          CHANGED=$(echo "$DIFF" | grep '^diff --git' | sed 's|diff --git a/\(.\+\) b/.\+|\1|' | head -20)

          python3 << 'PYEOF'
          import os
          diff = os.environ["DIFF_CONTENT"]
          changed = os.environ["CHANGED_FILES"]
          with open("/tmp/review/security_prompt.txt") as f:
              prompt = f.read()
          prompt = prompt.replace("{DIFF}", diff[:8000]).replace("{CHANGED_FILES}", changed)
          with open("/tmp/review/security-prompt-final.txt", "w") as f:
              f.write(prompt)
          PYEOF

          python3 /tmp/review/llm_review.py \
            /tmp/review/security-prompt-final.txt \
            /tmp/security-findings.json \
            owl-alpha \
            "You are a security-focused code reviewer. Output ONLY valid JSON, no markdown."

          echo "result=$(cat /tmp/security-findings.json | jq -c .)"
        env:
          DIFF_CONTENT: ${{ steps.diff.outputs.diff }}
          CHANGED_FILES: ${{ steps.files.outputs.files }}

      - name: Run quality review
        id: quality
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO")
          CHANGED=$(echo "$DIFF" | grep '^diff --git' | sed 's|diff --git a/\(.\+\) b/.\+|\1|' | head -20)

          python3 << 'PYEOF'
          import os
          diff = os.environ["DIFF_CONTENT"]
          changed = os.environ["CHANGED_FILES"]
          with open("/tmp/review/quality_prompt.txt") as f:
              prompt = f.read()
          prompt = prompt.replace("{DIFF}", diff[:6000]).replace("{CHANGED_FILES}", changed)
          with open("/tmp/review/quality-prompt-final.txt", "w") as f:
              f.write(prompt)
          PYEOF

          python3 /tmp/review/llm_review.py \
            /tmp/review/quality-prompt-final.txt \
            /tmp/quality-findings.json \
            always-on-free \
            "You are a code quality reviewer. Output ONLY valid JSON, no markdown."

          echo "result=$(cat /tmp/quality-findings.json | jq -c .)"
        env:
          DIFF_CONTENT: ${{ steps.diff.outputs.diff }}
          CHANGED_FILES: ${{ steps.files.outputs.files }}

      - name: Run architecture review
        id: architecture
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO")
          CHANGED=$(echo "$DIFF" | grep '^diff --git' | sed 's|diff --git a/\(.\+\) b/.\+|\1|' | head -20)

          python3 << 'PYEOF'
          import os
          diff = os.environ["DIFF_CONTENT"]
          changed = os.environ["CHANGED_FILES"]
          with open("/tmp/review/arch_prompt.txt") as f:
              prompt = f.read()
          prompt = prompt.replace("{DIFF}", diff[:6000]).replace("{CHANGED_FILES}", changed)
          with open("/tmp/review/arch-prompt-final.txt", "w") as f:
              f.write(prompt)
          PYEOF

          python3 /tmp/review/llm_review.py \
            /tmp/review/arch-prompt-final.txt \
            /tmp/arch-findings.json \
            owl-alpha \
            "You are an architecture reviewer. Output ONLY valid JSON, no markdown."

          echo "result=$(cat /tmp/arch-findings.json | jq -c .)"
        env:
          DIFF_CONTENT: ${{ steps.diff.outputs.diff }}
          CHANGED_FILES: ${{ steps.files.outputs.files }}

      - name: Synthesize and post review
        if: always()
        id: synthesize
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone

          all_findings = []
          for agent in ["security", "quality", "architecture"]:
              path = f"/tmp/{agent}-findings.json"
              if os.path.exists(path):
                  with open(path) as f:
                      findings = json.load(f)
                      for item in findings:
                          item["agent"] = agent
                          all_findings.append(item)

          critical = [f for f in all_findings if f.get("severity") == "critical"]
          high = [f for f in all_findings if f.get("severity") == "high"]
          medium = [f for f in all_findings if f.get("severity") == "medium"]
          low = [f for f in all_findings if f.get("severity") == "low"]
          info = [f for f in all_findings if f.get("severity") == "info"]

          if critical or high:
              verdict = "\U0001f534 **REQUEST_CHANGES**"
          elif medium:
              verdict = "\U0001f7e1 **COMMENT**"
          elif low:
              verdict = "\U0001f7e2 **APPROVE** with suggestions"
          else:
              verdict = "\u2705 **APPROVE** - no issues found"

          lines = [verdict, ""]
          lines.append("<!-- auto-review:synthesis -->")
          lines.append(f"*Automated review at {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}*")
          lines.append("")

          for severity, items in [
              ("\U0001f534 Critical", critical),
              ("\U0001f7e0 High", high),
              ("\U0001f7e1 Medium", medium),
              ("\U0001f7e2 Low", low),
              ("\u2139\ufe0f Info", info),
          ]:
              if items:
                  lines.append(f"### {severity}")
                  for f in items:
                      cwe = f.get("cwe", "")
                      file_ref = f.get("file", "unknown")
                      line_ref = f.get("line", "")
                      line_str = f":{line_ref}" if line_ref else ""
                      lines.append(f"- **{file_ref}{line_str}** ({cwe}): {f.get('description', '')}")
                      if f.get("fix"):
                          lines.append(f"  - \U0001f4a1 Fix: {f['fix']}")
                  lines.append("")

          lines.append("---")
          lines.append("*This review was generated automatically by OmniRoute LLM agents. Please verify findings before acting.*")

          body = "\n".join(lines)

          result = subprocess.run(
              ["gh", "pr", "comment", os.environ["PR_NUMBER"], "--repo", os.environ["REPO"], "--body", body],
              capture_output=True, text=True
          )

          if result.returncode == 0:
              print(f"posted=true")
              print(f"findings_count={len(all_findings)}")
              print(f"critical={len(critical)}")
              print(f"high={len(high)}")
              print(f"needs_human={'true' if critical or high else 'false'}")
          else:
              print(f"posted=false")
              print(f"error={result.stderr[:200]}")
          PYEOF

      - name: Add labels based on findings
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          all_findings = []
          for agent in ["security", "quality", "architecture"]:
              path = f"/tmp/{agent}-findings.json"
              if os.path.exists(path):
                  with open(path) as f:
                      all_findings.extend(json.load(f))

          labels = []
          if any(f.get("severity") in ("critical", "high") for f in all_findings):
              labels.append("needs-human-review")
          if all_findings:
              labels.append("auto-reviewed")

          if labels:
              subprocess.run(
                  ["gh", "pr", "edit", os.environ["PR_NUMBER"], "--repo", os.environ["REPO"],
                   "--add-label", ",".join(labels)],
                  capture_output=True, text=True
              )
              print(f"Added labels: {', '.join(labels)}")
          else:
              print("No labels to add")
          PYEOF

      - name: Set commit status check
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          all_findings = []
          for agent in ["security", "quality", "architecture"]:
              path = f"/tmp/{agent}-findings.json"
              if os.path.exists(path):
                  with open(path) as f:
                      all_findings.extend(json.load(f))

          critical = [f for f in all_findings if f.get("severity") == "critical"]
          high = [f for f in all_findings if f.get("severity") == "high"]

          sha = subprocess.run(
              ["git", "rev-parse", "HEAD"],
              capture_output=True, text=True
          ).stdout.strip()

          if critical:
              state = "failure"
              description = f"{len(critical)} critical finding(s) need resolution"
          elif high:
              state = "failure"
              description = f"{len(high)} high-severity finding(s) need human review"
          elif all_findings:
              state = "success"
              description = f"Auto-review: {len(all_findings)} findings (no critical/high)"
          else:
              state = "success"
              description = "Auto-review: no issues found"

          payload = json.dumps({
              "state": state,
              "description": description,
              "context": "auto-review/llm"
          })

          subprocess.run(
              ["gh", "api", f"repos/{os.environ['REPO']}/statuses/{sha}",
               "-X", "POST", "-H", "Accept: application/vnd.github+json",
               "-d", payload],
              capture_output=True, text=True
          )

          print(f"Status: {state} - {description}")
          PYEOF
