name: E2E (Playwright)

# Wires the existing Playwright e2e suite (tests/e2e/) into CI against a REAL
# stack: a natively-booted Django backend (daphne :8000) + Redis (Channels layer)
# + the Vite frontend (:8081). This exercises the actual game flow
# (create -> join -> start, full games to bingo) — not the Lovable prototype
# that the TestDriver suite points at.
#
# Stack contract (see backend/sound_royale_api/settings.py + src/services/api.ts):
#   - Backend uses python-decouple; SECRET_KEY is required, everything else has a default.
#   - Default DB engine is sqlite3 (no Postgres container needed for e2e).
#   - Frontend calls http://localhost:8000/api by default; CORS must allow :8081.
#   - Live specs read LIVE_API_BASE_URL for node-side backend state checks.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Redis is required for the Django Channels layer (real WebSocket path).
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
    env:
      # --- Backend (Django + decouple) ---
      SECRET_KEY: e2e-ci-secret-key-not-for-production
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: sound_royale_api.settings
      # Include localhost:8000 so axios Host header (localhost:8000) is allowed.
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver,localhost:8000
      # Frontend dev server runs on :8081 — must be CORS-allowed or live UI calls fail.
      CORS_ALLOWED_ORIGINS: http://localhost:8081,http://localhost:8080
      CSRF_TRUSTED_ORIGINS: http://localhost:8081,http://localhost:8080,https://localhost
      REDIS_URL: redis://localhost:6379/0
      # --- Live e2e specs hit the real backend ---
      LIVE_API_BASE_URL: http://localhost:8000/api
      # Opt-in real WebSocket path (frontend+backend+Redis all up). Set "false" if flaky.
      LIVE_WS_E2E: "true"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      # Django LOGGING writes to backend/logs/django.log; the dir is gitignored
      # and absent in a fresh checkout, so settings load crashes before migrate.
      - name: Create backend logs directory
        run: mkdir -p backend/logs

      - name: E2E preflight (structural guard)
        run: npm run test:e2e:preflight

      - name: Run migrations (SQLite)
        run: |
          cd backend
          source venv/bin/activate
          python manage.py migrate

      - name: Start backend (daphne :8000)
        run: |
          cd backend
          source venv/bin/activate
          nohup python -m daphne -p 8000 -b 0.0.0.0 sound_royale_api.asgi:application > /tmp/backend.log 2>&1 &

      - name: Start frontend (vite :8081)
        run: nohup npm run dev:frontend > /tmp/frontend.log 2>&1 &

      - name: Wait for services
        run: |
          wait_for() {
            local url="$1"
            for i in $(seq 1 40); do
              if curl -s -o /dev/null "$url"; then return 0; fi
              sleep 2
            done
            return 1
          }
          if ! wait_for http://localhost:8000/api/health/; then
            echo "::error::Backend never became reachable"; echo "--- backend.log ---"; cat /tmp/backend.log; exit 1
          fi
          if ! wait_for http://localhost:8081/; then
            echo "::error::Frontend never became reachable"; echo "--- frontend.log ---"; cat /tmp/frontend.log; exit 1
          fi
          echo "Backend and frontend are up."

      - name: Run Playwright E2E
        # workers=1 avoids SQLite "database is locked" under concurrent writers.
        run: npx playwright test --workers=1 --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
