name: PR Agent
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  pr-agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: self-hosted
    permissions:
      pull-requests: write
      issues: write
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pr-agent
        run: pip install pr-agent
      - name: Run PR Agent
        run: python -m pr_agent.servers.github_action_runner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI__API_BASE: http://localhost:20128/v1
          OPENAI__KEY: ${{ secrets.OMNIROUTE_KEY }}
