name: GAIA Guards CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.job }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run GAIA guard unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt || true; fi

      - name: Run GAIA guard tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/gaia/test_gaia_guards.py

  django-tests:
    name: Django Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Django tests
        env:
          PYTHONPATH: .
          DJANGO_SETTINGS_MODULE: sound_royale_api.settings
        run: |
          python backend/manage.py test

  security-integrity:
    name: GAIA Integrity & Signing Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run GAIA Integrity Scanner (CI + JSON)
        id: scan
        run: |
          set -euo pipefail
          python backend/gaia/integrity_scanner.py --ci --json --scan-beads > integrity_report.json
          echo "generated_report=integrity_report.json" >> $GITHUB_OUTPUT

      - name: Upload integrity scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gaia-integrity-report
          path: integrity_report.json

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend deps
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps
          npm rebuild

      - name: TypeScript typecheck
        run: |
          npx tsc --noEmit --incremental --tsBuildInfoFile .tsbuildinfo

      - name: Upload TS build info (cache)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-buildinfo
          path: .tsbuildinfo

      - name: Frontend build
        run: |
          npm run build --if-present

      - name: Secret grep checks (CI Gate #4)
        id: secrets
        run: |
          set -euo pipefail
          
          VIOLATIONS=0
          
          check_pattern() {
            local pattern="$1"
            local description="$2"
            local files="$3"
            
            echo "Checking: $description"
            if command -v rg >/dev/null 2>&1; then
              matches=$(rg -n "$pattern" $files 2>/dev/null || true)
              if [ -n "$matches" ]; then
                echo "❌ VIOLATION: $description"
                echo "$matches"
                VIOLATIONS=$((VIOLATIONS + 1))
              else
                echo "✓ PASS: $description"
              fi
            else
              matches=$(grep -R -n "$pattern" $files 2>/dev/null || true)
              if [ -n "$matches" ]; then
                echo "❌ VIOLATION: $description"
                echo "$matches"
                VIOLATIONS=$((VIOLATIONS + 1))
              else
                echo "✓ PASS: $description"
              fi
            fi
          }
          
          readarray -t TS_FILES < <(find src -type f \( -name '*.ts' -o -name '*.tsx' \))
          
          check_pattern 'console\.log[^\n]*playerSecret' "playerSecret in console.log (log exposure)" "${TS_FILES[@]}"
          
          check_pattern '(["\'']playerSecret["'\'']\s*:\s*["'\''][^"\'']+["'\''])' "playerSecret literal value in API objects" "${TS_FILES[@]}"
          check_pattern 'playerSecret\s*:\s*[^,)}]+' "playerSecret field surface (non-literal)" "${TS_FILES[@]}"
          
          check_pattern 'error[^\n]*playerSecret' "playerSecret in error context" "${TS_FILES[@]}"
          
          check_pattern 'playerSecret' "playerSecret in GameContext" "src/context/GameContext.tsx"
          
          echo ""
          echo "========================================="
          if [ $VIOLATIONS -gt 0 ]; then
            echo "❌ FAILED: Found $VIOLATIONS secret exposure violation(s)"
            echo "Refer to AGENTS.md security policy: Never expose playerSecret in logs or API responses"
            exit 1
          else
            echo "✓ PASSED: CI Gate #4 - No secret exposures detected"
            echo "========================================="
          fi

      - name: Install Cosign
        run: |
          set -euo pipefail
          COSIGN_VERSION=v2.2.4
          curl -sSL -o cosign.tgz "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64.tar.gz" || { echo "Cosign download failed, skipping installation"; exit 0; }
          tar -xzf cosign.tgz || { echo "Cosign extraction failed, skipping installation"; rm -f cosign.tgz; exit 0; }
          sudo mv cosign /usr/local/bin/cosign || { echo "Cosign install failed, skipping"; exit 0; }
          cosign version || echo "Cosign verify skipped"

      - name: Cosign verify (keyless, optional gate)
        env:
          COSIGN_EXPERIMENTAL: 'true'
          COSIGN_VERIFY_SUBJECT: ${{ secrets.COSIGN_VERIFY_SUBJECT }}
          COSIGN_VERIFY_IMAGE: ${{ secrets.COSIGN_VERIFY_IMAGE }}
        run: |
          set -euo pipefail
          if ! command -v cosign >/dev/null 2>&1; then
            echo "Cosign verify skipped: cosign not installed"
            exit 0
          fi
          if [ -z "${COSIGN_VERIFY_IMAGE:-}" ] || [ -z "${COSIGN_VERIFY_SUBJECT:-}" ]; then
            echo "Cosign verify skipped: missing COSIGN_VERIFY_IMAGE or COSIGN_VERIFY_SUBJECT"
            exit 0
          fi
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "${COSIGN_VERIFY_SUBJECT}" \
            "${COSIGN_VERIFY_IMAGE}"

  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install frontend dependencies
        run: |
          npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps chromium

      - name: Start backend server
        run: |
          cd backend && python manage.py runserver 8000 &
          echo "Backend started on port 8000"

      - name: Run E2E tests
        run: |
          npx playwright test --project=chromium --reporter=line
