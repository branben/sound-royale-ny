name: GAIA Guards CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run GAIA guard unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt || true; fi

      - name: Run GAIA guard tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/gaia/test_gaia_guards.py

  security-integrity:
    name: GAIA Integrity & Signing Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run GAIA Integrity Scanner (CI + JSON)
        id: scan
        run: |
          set -euo pipefail
          python backend/gaia/integrity_scanner.py --ci --json > integrity_report.json
          echo "generated_report=integrity_report.json" >> $GITHUB_OUTPUT

      - name: Upload integrity scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gaia-integrity-report
          path: integrity_report.json

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend deps
        run: |
          npm ci --no-audit || npm install --no-audit --legacy-peer-deps

      - name: TypeScript typecheck
        run: |
          npx tsc --noEmit

      - name: Frontend build
        run: |
          npm run build --if-present

      - name: Secret grep checks (CI Gate #4)
        id: secrets
        run: |
          set -euo pipefail
          
          # CI Gate #4: Comprehensive secret detection
          # Checks for playerSecret exposure per AGENTS.md security policy
          
          VIOLATIONS=0
          
          # Helper function to check patterns
          check_pattern() {
            local pattern="$1"
            local description="$2"
            local files="$3"
            
            echo "Checking: $description"
            if command -v rg >/dev/null 2>&1; then
              matches=$(rg -n "$pattern" $files 2>/dev/null || true)
              if [ -n "$matches" ]; then
                echo "❌ VIOLATION: $description"
                echo "$matches"
                VIOLATIONS=$((VIOLATIONS + 1))
              else
                echo "✓ PASS: $description"
              fi
            else
              matches=$(grep -R -n "$pattern" $files 2>/dev/null || true)
              if [ -n "$matches" ]; then
                echo "❌ VIOLATION: $description"
                echo "$matches"
                VIOLATIONS=$((VIOLATIONS + 1))
              else
                echo "✓ PASS: $description"
              fi
            fi
          }
          
          # Gate 4a: Check for playerSecret in console.log (logs)
          check_pattern 'console\.log.*playerSecret' "playerSecret in console.log (log exposure)" "src/"
          
          # Gate 4b: Check for playerSecret in API responses
          check_pattern 'playerSecret.*:.*"' "playerSecret in API response objects" "src/"
          check_pattern '"playerSecret"' "playerSecret key in objects" "src/"
          
          # Gate 4c: Check for playerSecret in error handling
          check_pattern 'error.*playerSecret' "playerSecret in error context" "src/"
          
          # Gate 4d: Check GameContext specifically (critical)
          check_pattern 'playerSecret' "playerSecret in GameContext" "src/context/GameContext.tsx"
          
          # Final verdict
          echo ""
          echo "========================================="
          if [ $VIOLATIONS -gt 0 ]; then
            echo "❌ FAILED: Found $VIOLATIONS secret exposure violation(s)"
            echo "Refer to AGENTS.md security policy: Never expose playerSecret in logs or API responses"
            exit 1
          else
            echo "✓ PASSED: CI Gate #4 - No secret exposures detected"
            echo "========================================="
          fi

      - name: Install Cosign
        run: |
          COSIGN_VERSION=v2.2.4
          curl -sSL -o cosign.tgz https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64.tar.gz
          tar -xzf cosign.tgz
          sudo mv cosign /usr/local/bin/cosign
          cosign version

      - name: Cosign verify (keyless, optional gate)
        env:
          COSIGN_EXPERIMENTAL: 'true'
          COSIGN_VERIFY_SUBJECT: ${{ secrets.COSIGN_VERIFY_SUBJECT }}
          COSIGN_VERIFY_IMAGE: ${{ secrets.COSIGN_VERIFY_IMAGE }}
        run: |
          set -euo pipefail
          if [ -z "${COSIGN_VERIFY_IMAGE:-}" ] || [ -z "${COSIGN_VERIFY_SUBJECT:-}" ]; then
            echo "Cosign verify skipped: missing COSIGN_VERIFY_IMAGE or COSIGN_VERIFY_SUBJECT"
            exit 0
          fi
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "${COSIGN_VERIFY_SUBJECT}" \
            "${COSIGN_VERIFY_IMAGE}"
