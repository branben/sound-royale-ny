name: Sound Royale CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  django-tests:
    name: Django Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sound_royale_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django

      - name: Run Django tests
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: sound_royale_api.settings_test
          PYTHONPATH: ..
        run: |
          set +e
          TEST_OUTPUT=$(pytest -v --tb=short 2>&1)
          PYTEST_EXIT=$?
          set -e
          echo "$TEST_OUTPUT"

          # Verify at least 1 test was collected (avoid false-green on 0 tests)
          if ! echo "$TEST_OUTPUT" | grep -qE "collected [1-9][0-9]* items"; then
            echo "ERROR: No tests were collected!"
            exit 1
          fi

          TEST_COUNT=$(echo "$TEST_OUTPUT" | grep -oE "collected [0-9]+ items" | grep -oE "[0-9]+")
          echo "SUCCESS: $TEST_COUNT tests collected and executed"

          # Fail CI if pytest failed
          if [ "$PYTEST_EXIT" -ne 0 ]; then
            echo "ERROR: Pytest failed!"
            exit "$PYTEST_EXIT"
          fi

  frontend-checks:
    name: Frontend Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Prettier formatting check
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build

  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for tracked .beads directory
        run: |
          if git ls-files .beads | grep -q .; then
            echo "ERROR: .beads is tracked by git. Beads must be local/private and gitignored."
            git ls-files .beads
            exit 1
          fi
          echo "✓ No tracked .beads files"

      - name: Check for absolute file URLs
        run: |
          if git grep -n "file:///Users/" -- . \
              ':!package-lock.json' ':!package.json' \
              ':!.gaia_skills/' ':!README.md' \
              ':!.github/workflows/' >/dev/null 2>&1; then
            echo "ERROR: Found absolute file URLs (file:///Users/...) committed to repo."
            git grep -n "file:///Users/" -- . \
              ':!package-lock.json' ':!package.json' \
              ':!.gaia_skills/' ':!README.md' \
              ':!.github/workflows/' || true
            exit 1
          fi
          echo "✓ No absolute file URLs found"
